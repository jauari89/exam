<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360" role="img" aria-label="Block on a rough horizontal surface with force arrows">
  <rect width="640" height="360" fill="#f8fbfa"/>
  <line x1="70" y1="250" x2="570" y2="250" stroke="#455a55" stroke-width="5"/>
  <rect x="260" y="170" width="120" height="80" rx="6" fill="#d8e9e4" stroke="#10221f" stroke-width="4"/>
