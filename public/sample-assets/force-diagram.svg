  <line x1="260" y1="210" x2="150" y2="210" stroke="#b42318" stroke-width="6" marker-end="url(#arrowRed)"/>
  <line x1="320" y1="170" x2="320" y2="70" stroke="#1f3430" stroke-width="6" marker-end="url(#arrowDark)"/>
